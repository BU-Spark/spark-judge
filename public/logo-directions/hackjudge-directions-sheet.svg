  <path d="M777 696h53" stroke="#0d9488" stroke-width="4" stroke-linecap="round" opacity="0.8" />
  <path d="M777 714h85" stroke="#0f172a" stroke-width="4" stroke-linecap="round" opacity="0.16" />
  <text x="670" y="736" fill="#0f172a" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700">Best if:</text>
  <text x="725" y="736" fill="#475569" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="500">you want the brand to feel more competitive, event-driven, and high-stakes.</text>
