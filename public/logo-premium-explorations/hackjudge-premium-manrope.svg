<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">HackJudge premium logo exploration - Manrope plus Inter</title>
  <desc id="desc">A premium brand exploration card for HackJudge featuring a refined score-grid mark, Manrope wordmark, and a small application preview.</desc>

  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1080" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F5F0"/>
      <stop offset="1" stop-color="#ECE8DF"/>
    </linearGradient>
    <linearGradient id="panel" x1="228" y1="156" x2="972" y2="580" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#F7F4ED" stop-opacity="0.84"/>
    </linearGradient>
    <linearGradient id="markFill" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#143D3C"/>
      <stop offset="1" stop-color="#234D4B"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#D8BF77"/>
      <stop offset="1" stop-color="#B49247"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1200" height="720" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#182322" flood-opacity="0.10"/>
    </filter>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%" filterUnits="objectBoundingBox" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@600;700;800&amp;display=swap');

      .eyebrow {
        font-family: 'Inter', sans-serif;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        fill: #66706D;
      }

      .meta {
        font-family: 'Inter', sans-serif;
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        fill: #6E7774;
      }

      .label {
        font-family: 'Inter', sans-serif;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        fill: #7A827F;
      }

      .value {
        font-family: 'Inter', sans-serif;
        font-size: 20px;
        font-weight: 500;
        letter-spacing: 0.01em;
        fill: #20312F;
      }

      .headline {
        font-family: 'Manrope', sans-serif;
        font-size: 56px;
        font-weight: 800;
        letter-spacing: -0.05em;
        fill: #182322;
      }

      .subhead {
        font-family: 'Inter', sans-serif;
        font-size: 18px;
        font-weight: 500;
        letter-spacing: 0.01em;
        fill: #56615E;
      }

      .wordmark {
        font-family: 'Manrope', sans-serif;
        font-size: 78px;
        font-weight: 700;
        letter-spacing: -0.055em;
        fill: #182322;
      }

      .smallword {
        font-family: 'Manrope', sans-serif;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -0.04em;
        fill: #182322;
      }

      .chip {
        font-family: 'Inter', sans-serif;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        fill: #38524F;
      }
    </style>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="114" r="132" fill="#D8BF77" fill-opacity="0.10" filter="url(#soft)"/>
  <circle cx="190" cy="646" r="142" fill="#1B5A56" fill-opacity="0.07" filter="url(#soft)"/>

  <g filter="url(#shadow)">
    <rect x="72" y="68" width="1056" height="584" rx="34" fill="url(#panel)" stroke="#FFFFFF" stroke-opacity="0.75"/>
  </g>

  <g opacity="0.72">
    <line x1="834" y1="140" x2="834" y2="580" stroke="#D9D2C4"/>
    <line x1="72" y1="140" x2="1128" y2="140" stroke="#E1DBD0"/>
  </g>

  <text x="120" y="118" class="eyebrow">HackJudge Brand Exploration</text>
  <text x="858" y="118" class="eyebrow">Concept 02</text>

  <g transform="translate(120 186)">
    <text x="0" y="0" class="headline">Premium Systems</text>
    <text x="0" y="38" class="subhead">A calmer score-grid mark with stronger geometry, restrained contrast, and a product-grade wordmark.</text>
  </g>

  <g transform="translate(120 286)">
    <g transform="translate(0 0)">
      <rect x="0" y="0" width="190" height="190" rx="42" fill="#182322"/>
      <rect x="15" y="15" width="160" height="160" rx="32" stroke="url(#goldLine)" stroke-width="2.25" fill="url(#markFill)"/>

      <g transform="translate(45 45)">
        <rect x="0" y="0" width="30" height="30" rx="9" fill="#EDE5D4"/>
        <rect x="38" y="0" width="30" height="30" rx="9" fill="#C6AE65"/>
        <rect x="76" y="0" width="30" height="30" rx="9" fill="#305A57"/>

        <rect x="0" y="38" width="30" height="30" rx="9" fill="#244B49"/>
        <rect x="38" y="38" width="30" height="30" rx="9" fill="#F2ECDD"/>
        <rect x="76" y="38" width="30" height="30" rx="9" fill="#345F5B"/>

        <rect x="0" y="76" width="30" height="30" rx="9" fill="#1A3533"/>
        <rect x="38" y="76" width="30" height="30" rx="9" fill="#26514E"/>
        <rect x="76" y="76" width="30" height="30" rx="9" fill="#EEF2EF"/>

        <path d="M16 56L34 74L89 18" stroke="#F7F3E8" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M16 56L34 74L89 18" stroke="#D2BA73" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </g>

    <g transform="translate(232 17)">
      <text x="0" y="92" class="wordmark">HackJudge</text>
      <text x="2" y="132" class="subhead">Structured judging for modern hackathons</text>

      <g transform="translate(0 174)">
        <rect x="0" y="0" width="358" height="110" rx="24" fill="#FCFBF7" stroke="#D9D2C4"/>
        <text x="28" y="34" class="label">Concept</text>
        <text x="28" y="72" class="value">Ledger Grid</text>
        <text x="28" y="95" class="meta">Score-grid DNA, refined into a seal</text>

        <rect x="382" y="0" width="290" height="110" rx="24" fill="#FCFBF7" stroke="#D9D2C4"/>
        <text x="410" y="34" class="label">Font Pairing</text>
        <text x="410" y="72" class="value">Manrope + Inter</text>
        <text x="410" y="95" class="meta">Display / Product UI</text>
      </g>
    </g>
  </g>

  <g transform="translate(872 186)">
    <text x="0" y="0" class="label">Mark-Only Preview</text>

    <g transform="translate(0 24)">
      <rect x="0" y="0" width="190" height="224" rx="28" fill="#F8F5EE" stroke="#D9D2C4"/>
      <rect x="36" y="28" width="118" height="118" rx="30" fill="#182322"/>
      <rect x="46" y="38" width="98" height="98" rx="22" fill="url(#markFill)" stroke="url(#goldLine)" stroke-width="2"/>

      <g transform="translate(63 55)">
        <rect x="0" y="0" width="18" height="18" rx="5.5" fill="#F5EFE1"/>
        <rect x="23" y="0" width="18" height="18" rx="5.5" fill="#C9B16C"/>
        <rect x="46" y="0" width="18" height="18" rx="5.5" fill="#34615D"/>

        <rect x="0" y="23" width="18" height="18" rx="5.5" fill="#264D4A"/>
        <rect x="23" y="23" width="18" height="18" rx="5.5" fill="#F4F0E8"/>
        <rect x="46" y="23" width="18" height="18" rx="5.5" fill="#315B58"/>

        <rect x="0" y="46" width="18" height="18" rx="5.5" fill="#1B3836"/>
        <rect x="23" y="46" width="18" height="18" rx="5.5" fill="#264F4C"/>
        <rect x="46" y="46" width="18" height="18" rx="5.5" fill="#EEF2EF"/>

        <path d="M10 34L22 46L53 15" stroke="#F7F4EA" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M10 34L22 46L53 15" stroke="#D1B86F" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
      </g>

      <rect x="24" y="166" width="142" height="38" rx="19" fill="#182322"/>
      <text x="95" y="191" text-anchor="middle" class="chip">app icon preview</text>
    </g>

    <g transform="translate(0 280)">
      <text x="0" y="0" class="label">Wordmark Sample</text>
      <rect x="0" y="20" width="190" height="120" rx="24" fill="#FCFBF7" stroke="#D9D2C4"/>
      <text x="24" y="74" class="smallword">HackJudge</text>
      <text x="24" y="100" class="meta">set in Manrope</text>
    </g>
  </g>

  <g transform="translate(120 602)">
    <rect x="0" y="0" width="196" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.64" stroke="#DDD6C9"/>
    <text x="98" y="22" text-anchor="middle" class="chip">precise • calm • product-grade</text>
  </g>
</svg>
