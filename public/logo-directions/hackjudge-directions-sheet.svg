  <rect width="1200" height="920" fill="#f8fafc" />
  <text x="60" y="82" fill="#0f172a" font-family="ui-sans-serif, system-ui, sans-serif" font-size="38" font-weight="800" letter-spacing="-0.04em">HackJudge Logo Directions</text>
  <text x="60" y="118" fill="#64748b" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="500">Four different visual directions for the judging platform brand.</text>

  <rect x="60" y="156" width="500" height="300" rx="28" fill="#ffffff" stroke="#dbe3ea" stroke-width="2" />
  <text x="90" y="208" fill="#0f172a" font-family="ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="800">1. Verdict Badge</text>
  <text x="90" y="238" fill="#64748b" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="500">Confident, product-ready, and balanced between event prestige and utility.</text>
