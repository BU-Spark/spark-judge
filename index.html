<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <meta name="theme-color" content="#fafafa" id="theme-color-meta" />
    <link rel="icon" type="image/svg+xml" href="/hackjudge-mark.svg" />
    <link rel="stylesheet" href="/src/index.css" />

    <title>HackJudge</title>

    <meta property="og:image" content="/og-preview.png" />
    <script>
      // Apply theme before first paint so the iOS status bar / address bar
      // match the user's chosen theme without a light-mode flash.
      (function () {
        try {
          var stored = localStorage.getItem("vite-ui-theme");
          var theme = stored || "system";
          var resolved =
            theme === "system"
              ? window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : theme;
          var root = document.documentElement;
          root.classList.remove("light", "dark");
          root.classList.add(resolved);
          var color = resolved === "dark" ? "#0b1215" : "#fafafa";
          var meta = document.getElementById("theme-color-meta");
          if (meta) meta.setAttribute("content", color);
          root.style.backgroundColor = color;
        } catch (e) {
          // Ignore: storage may be unavailable in some contexts.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
