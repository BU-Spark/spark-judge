  <rect x="139" y="661" width="14" height="14" rx="4" fill="#0f172a" />
  <path d="M105 656l12 12 31-35" stroke="#f59e0b" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" />
  <text x="205" y="656" fill="#0f172a" font-family="ui-sans-serif, system-ui, sans-serif" font-size="42" font-weight="800" letter-spacing="-0.04em">HackJudge</text>
  <rect x="205" y="673" width="76" height="10" rx="5" fill="#0f172a" opacity="0.12" />
  <rect x="205" y="691" width="96" height="10" rx="5" fill="#0d9488" opacity="0.3" />
  <rect x="205" y="709" width="56" height="10" rx="5" fill="#0f172a" opacity="0.12" />
  <text x="90" y="736" fill="#0f172a" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700">Best if:</text>
  <text x="145" y="736" fill="#475569" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="500">the product story should focus on judging mechanics and transparent scoring.</text>

  <rect x="640" y="500" width="500" height="300" rx="28" fill="#ffffff" stroke="#dbe3ea" stroke-width="2" />
  <text x="670" y="552" fill="#0f172a" font-family="ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="800">4. Arena Brackets</text>
  <text x="670" y="582" fill="#64748b" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="500">Sharper and more competitive. This leans into event structure, brackets, and winners.</text>
