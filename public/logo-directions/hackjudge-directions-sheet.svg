  <text x="775" y="656" fill="#0f172a" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="38" font-weight="800" letter-spacing="-0.04em">HACKJUDGE</text>
