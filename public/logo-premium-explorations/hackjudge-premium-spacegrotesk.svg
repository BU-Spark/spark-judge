<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">HackJudge premium brand exploration: Signal Ledger</title>
  <desc id="desc">A technical premium brand card featuring a refined score-grid logo, Space Grotesk wordmark, Inter labels, and a small mark-only app preview.</desc>

  <defs>
    <linearGradient id="bg" x1="112" y1="76" x2="1092" y2="668" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F8F6"/>
      <stop offset="0.52" stop-color="#EEF1EE"/>
      <stop offset="1" stop-color="#E6EBE8"/>
    </linearGradient>

    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FBFCFB" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#F1F4F2" stop-opacity="0.88"/>
    </linearGradient>

    <linearGradient id="inkGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#102126"/>
      <stop offset="1" stop-color="#24343A"/>
    </linearGradient>

    <linearGradient id="tealGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1D8B89"/>
      <stop offset="1" stop-color="#0F5F63"/>
    </linearGradient>

    <linearGradient id="brassGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#C7A767"/>
      <stop offset="1" stop-color="#9B7B41"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#1C2D31" flood-opacity="0.08"/>
    </filter>

    <filter id="microShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#102126" flood-opacity="0.12"/>
    </filter>

    <pattern id="dotField" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#D4DBD7"/>
    </pattern>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600;700&amp;display=swap');

      .label {
        font-family: 'Inter', sans-serif;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        fill: #647378;
      }

      .meta {
        font-family: 'Inter', sans-serif;
        font-size: 15px;
        font-weight: 500;
        letter-spacing: 0.02em;
        fill: #506065;
      }

      .wordmark {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 86px;
        font-weight: 600;
        letter-spacing: -0.05em;
        fill: #14262B;
      }

      .submark {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 24px;
        font-weight: 500;
        letter-spacing: -0.03em;
        fill: #314247;
      }

      .smallTitle {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 28px;
        font-weight: 600;
        letter-spacing: -0.03em;
        fill: #13262B;
      }

      .tiny {
        font-family: 'Inter', sans-serif;
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.02em;
        fill: #6A797E;
      }
    </style>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="720" fill="url(#dotField)" opacity="0.22"/>

  <circle cx="1058" cy="118" r="142" fill="#D5E4DF" opacity="0.42"/>
  <circle cx="154" cy="626" r="128" fill="#D8E2DE" opacity="0.48"/>

  <g filter="url(#softShadow)">
    <rect x="54" y="48" width="1092" height="624" rx="34" fill="url(#panel)" stroke="#FFFFFF" stroke-opacity="0.8"/>
  </g>

  <text x="102" y="111" class="label">Premium Exploration</text>
  <text x="102" y="141" class="smallTitle">Signal Ledger</text>

  <text x="738" y="111" class="label">Font Pairing</text>
  <text x="738" y="141" class="meta">Space Grotesk + Inter</text>

  <text x="102" y="612" class="label">Brand Position</text>
  <text x="102" y="640" class="meta">Technical, authored, quiet</text>

  <g transform="translate(118 182)">
    <g filter="url(#microShadow)">
      <rect x="0" y="0" width="220" height="220" rx="46" fill="url(#inkGrad)"/>
      <rect x="16" y="16" width="188" height="188" rx="34" stroke="#7E918E" stroke-opacity="0.28" stroke-width="1.5"/>
      <rect x="34" y="34" width="152" height="152" rx="26" stroke="#C9D2CF" stroke-opacity="0.12" stroke-width="1.5"/>
    </g>

    <g transform="translate(51 51)">
      <rect x="0" y="0" width="34" height="34" rx="9" fill="#24373B"/>
      <rect x="43" y="0" width="34" height="34" rx="9" fill="#1C2D31"/>
      <rect x="86" y="0" width="34" height="34" rx="9" fill="#203136"/>

      <rect x="0" y="43" width="34" height="34" rx="9" fill="#1A2B30"/>
      <rect x="43" y="43" width="34" height="34" rx="9" fill="#203136"/>
      <rect x="86" y="43" width="34" height="34" rx="9" fill="#1A2B30"/>

      <rect x="0" y="86" width="34" height="34" rx="9" fill="#16262B"/>
      <rect x="43" y="86" width="34" height="34" rx="9" fill="#152429"/>
      <rect x="86" y="86" width="34" height="34" rx="9" fill="#203136"/>

      <path d="M17 62L59 103L110 28" stroke="url(#tealGrad)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="17" cy="62" r="7" fill="#E8F1EE"/>
      <circle cx="59" cy="103" r="7" fill="#E8F1EE"/>
      <circle cx="110" cy="28" r="7" fill="url(#brassGrad)"/>

      <rect x="0" y="86" width="34" height="34" rx="9" fill="#163238" opacity="0.52"/>
      <rect x="43" y="86" width="34" height="34" rx="9" fill="#0E5961" opacity="0.32"/>
      <rect x="86" y="0" width="34" height="34" rx="9" fill="#0C5058" opacity="0.22"/>
    </g>

    <rect x="152" y="26" width="18" height="18" rx="5" fill="url(#brassGrad)" opacity="0.95"/>
    <rect x="152" y="48" width="18" height="4" rx="2" fill="#B3C0BC" opacity="0.35"/>
  </g>

  <g transform="translate(386 234)">
    <text x="0" y="102" class="wordmark">HackJudge</text>
    <text x="3" y="150" class="submark">Structured evaluation for ambitious builds.</text>

    <g transform="translate(4 196)">
      <rect x="0" y="0" width="528" height="1.5" fill="#CCD5D1"/>
      <text x="0" y="38" class="tiny">Refined score-grid logic with embedded approval signal and restrained institutional tone.</text>
    </g>
  </g>

  <g transform="translate(790 330)">
    <text x="0" y="0" class="label">Mark Preview</text>

    <g transform="translate(0 30)" filter="url(#microShadow)">
      <rect x="0" y="0" width="240" height="240" rx="40" fill="#112226"/>
      <rect x="18" y="18" width="204" height="204" rx="30" stroke="#A6B4B0" stroke-opacity="0.24"/>
    </g>

    <g transform="translate(59 89)">
      <rect x="0" y="0" width="34" height="34" rx="9" fill="#22363A"/>
      <rect x="44" y="0" width="34" height="34" rx="9" fill="#1A2C30"/>
      <rect x="88" y="0" width="34" height="34" rx="9" fill="#1D3035"/>

      <rect x="0" y="44" width="34" height="34" rx="9" fill="#1A2B30"/>
      <rect x="44" y="44" width="34" height="34" rx="9" fill="#1E3236"/>
      <rect x="88" y="44" width="34" height="34" rx="9" fill="#1A2B30"/>

      <rect x="0" y="88" width="34" height="34" rx="9" fill="#142428"/>
      <rect x="44" y="88" width="34" height="34" rx="9" fill="#0F5960" opacity="0.38"/>
      <rect x="88" y="88" width="34" height="34" rx="9" fill="#1E3236"/>

      <path d="M17 63L60 103L111 27" stroke="url(#tealGrad)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="17" cy="63" r="6.5" fill="#EAF3F0"/>
      <circle cx="60" cy="103" r="6.5" fill="#EAF3F0"/>
      <circle cx="111" cy="27" r="6.5" fill="url(#brassGrad)"/>
    </g>

    <text x="1" y="296" class="tiny">App icon / favicon-ready silhouette</text>
  </g>

  <g opacity="0.92">
    <rect x="738" y="146" width="308" height="104" rx="20" fill="#F4F7F5" stroke="#D7DEDA"/>
    <text x="764" y="186" class="label">Concept</text>
    <text x="764" y="214" class="meta">Signal Ledger</text>
    <text x="764" y="238" class="tiny">A calmer, infrastructural take on the score-grid mark.</text>
  </g>

  <g opacity="0.75">
    <path d="M1017 560C1047 560 1071 536 1071 506" stroke="#8EA39D" stroke-width="1.5"/>
    <path d="M1008 560H1032" stroke="#8EA39D" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M1071 495V519" stroke="#8EA39D" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
