  <text x="670" y="392" fill="#0f172a" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700">Best if:</text>
  <text x="725" y="392" fill="#475569" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="500">you want it to feel more like a modern dev tool than an awards platform.</text>

  <rect x="60" y="500" width="500" height="300" rx="28" fill="#ffffff" stroke="#dbe3ea" stroke-width="2" />
  <text x="90" y="552" fill="#0f172a" font-family="ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="800">3. Score Grid</text>
  <text x="90" y="582" fill="#64748b" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="500">Operational and structured. This one emphasizes scoring, evaluation, and signal clarity.</text>
  <rect x="88" y="610" width="80" height="80" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="4" />
  <rect x="103" y="625" width="14" height="14" rx="4" fill="#0f172a" />
