<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">HackJudge Premium Exploration - Ledger Crest</title>
  <desc id="desc">Editorial luxury logo exploration for HackJudge using a refined score-grid crest and Bodoni Moda plus Inter.</desc>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,600;6..96,700&amp;family=Inter:wght@400;500;600&amp;display=swap');

    :root {
      --bg: #f4f0e9;
      --panel: #fbf8f2;
      --ink: #17191b;
      --muted: #686661;
      --line: #d7d0c3;
      --teal: #254b4b;
      --teal-soft: #6c8584;
      --brass: #b08a4f;
      --brass-soft: #d8c09c;
      --white: #fffdfa;
    }

    .eyebrow {
      font: 600 13px/1.2 "Inter", sans-serif;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      fill: var(--muted);
    }

    .kicker {
      font: 500 12px/1.2 "Inter", sans-serif;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      fill: var(--muted);
    }

    .title {
      font: 700 68px/1 "Bodoni Moda", serif;
      letter-spacing: 0.02em;
      fill: var(--ink);
    }

    .subtitle {
      font: 400 22px/1.5 "Inter", sans-serif;
      fill: var(--muted);
    }

    .brand {
      font: 700 82px/1 "Bodoni Moda", serif;
      letter-spacing: 0.035em;
      fill: var(--ink);
    }

    .brand-small {
      font: 700 30px/1 "Bodoni Moda", serif;
      letter-spacing: 0.03em;
      fill: var(--ink);
    }

    .label {
      font: 600 12px/1.2 "Inter", sans-serif;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      fill: var(--muted);
    }

    .meta {
      font: 500 14px/1.4 "Inter", sans-serif;
      fill: var(--ink);
    }

    .meta-soft {
      font: 500 13px/1.4 "Inter", sans-serif;
      fill: var(--muted);
    }

    .mini-ui {
      font: 600 11px/1 "Inter", sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      fill: var(--muted);
    }
  </style>

  <defs>
    <linearGradient id="bgWash" x1="170" y1="40" x2="1020" y2="680" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7F3EC"/>
      <stop offset="1" stop-color="#F0EBE2"/>
    </linearGradient>

    <radialGradient id="paperGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(880 210) rotate(136) scale(515 700)">
      <stop offset="0" stop-color="#FFFDF8"/>
      <stop offset="1" stop-color="#F6F1E8" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="brassStroke" x1="328" y1="220" x2="522" y2="414" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D9C39F"/>
      <stop offset="1" stop-color="#A78046"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#181818" flood-opacity="0.08"/>
    </filter>

    <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-color="#FFFFFF" flood-opacity="0.9"/>
    </filter>

    <clipPath id="cardClip">
      <rect x="32" y="32" width="1136" height="656" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#cardClip)">
    <rect width="1200" height="720" fill="var(--bg)"/>
    <rect x="32" y="32" width="1136" height="656" rx="28" fill="url(#bgWash)"/>
    <rect x="32" y="32" width="1136" height="656" rx="28" fill="url(#paperGlow)"/>
    <path d="M0 610C282 556 471 534 675 570C855 602 1009 676 1200 720V720H0V610Z" fill="#EDE5D8"/>
    <path d="M0 630C271 580 469 578 668 612C840 642 1008 689 1200 720V720H0V630Z" fill="#F6F1E9"/>

    <rect x="58" y="58" width="1084" height="604" rx="24" stroke="rgba(23,25,27,0.08)"/>

    <text x="88" y="104" class="eyebrow">Premium Exploration</text>
    <text x="88" y="152" class="title">Ledger Crest</text>
    <text x="90" y="192" class="subtitle">A quieter, more ceremonial take on the score-grid idea for HackJudge.</text>

    <g transform="translate(1020 86)">
      <rect x="0" y="0" width="96" height="34" rx="17" fill="#F8F4EC" stroke="#D8D0C4"/>
      <text x="48" y="21" text-anchor="middle" class="kicker">Concept 01</text>
    </g>

    <g filter="url(#softShadow)">
      <rect x="88" y="234" width="478" height="360" rx="28" fill="var(--panel)" stroke="rgba(23,25,27,0.08)"/>
    </g>

    <text x="120" y="270" class="label">Primary Mark</text>

    <g transform="translate(150 305)">
      <rect x="0" y="0" width="236" height="236" rx="44" fill="#FBF7F0" stroke="#212426" stroke-width="4"/>
      <rect x="16" y="16" width="204" height="204" rx="34" fill="none" stroke="#C8B9A0" stroke-opacity="0.55"/>
      <rect x="44" y="44" width="148" height="148" rx="26" fill="#F7F2E9" stroke="#D3C7B3"/>

      <path d="M92 44V192" stroke="#D8D0C3" stroke-width="1.5"/>
      <path d="M144 44V192" stroke="#D8D0C3" stroke-width="1.5"/>
      <path d="M44 92H192" stroke="#D8D0C3" stroke-width="1.5"/>
      <path d="M44 144H192" stroke="#D8D0C3" stroke-width="1.5"/>

      <rect x="55" y="55" width="26" height="26" rx="7" fill="#1A1C1E"/>
      <rect x="107" y="55" width="26" height="26" rx="7" fill="#274B4B"/>
      <rect x="159" y="55" width="22" height="22" rx="6" fill="#C2A06B" opacity="0.95"/>

      <rect x="55" y="107" width="26" height="26" rx="7" fill="#D8CEC0"/>
      <rect x="107" y="107" width="26" height="26" rx="7" fill="#1A1C1E"/>
      <rect x="159" y="107" width="26" height="26" rx="7" fill="#D8CEC0"/>

      <rect x="55" y="159" width="26" height="26" rx="7" fill="#D8CEC0"/>
      <rect x="107" y="159" width="26" height="26" rx="7" fill="#274B4B" opacity="0.88"/>
      <rect x="159" y="159" width="26" height="26" rx="7" fill="#1A1C1E"/>

      <path d="M67 129L101 163L171 91" stroke="#F7F2E9" stroke-width="19" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M67 129L101 163L171 91" stroke="url(#brassStroke)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

      <path d="M42 44H194" stroke="#1A1C1E" stroke-opacity="0.08" stroke-width="1"/>
      <path d="M44 194V42" stroke="#1A1C1E" stroke-opacity="0.08" stroke-width="1"/>
    </g>

    <g transform="translate(618 246)">
      <text x="0" y="0" class="label">Wordmark</text>
      <text x="0" y="112" class="brand">HackJudge</text>
      <line x1="0" y1="138" x2="422" y2="138" stroke="#D7D0C3"/>
      <text x="0" y="184" class="meta">Bodoni Moda brings ceremony and distinction; Inter keeps the product surface calm.</text>
      <text x="0" y="214" class="meta-soft">Designed to feel less like a dashboard tile and more like a judging authority.</text>

      <g transform="translate(0 264)">
        <rect x="0" y="0" width="170" height="38" rx="19" fill="#F7F2E9" stroke="#D7D0C3"/>
        <text x="85" y="24" text-anchor="middle" class="kicker">Bodoni Moda + Inter</text>
      </g>

      <g transform="translate(196 264)">
        <rect x="0" y="0" width="128" height="38" rx="19" fill="#F7F2E9" stroke="#D7D0C3"/>
        <text x="64" y="24" text-anchor="middle" class="kicker">Editorial Luxury</text>
      </g>
    </g>

    <g filter="url(#softShadow)">
      <rect x="618" y="408" width="466" height="186" rx="26" fill="var(--panel)" stroke="rgba(23,25,27,0.08)"/>
    </g>

    <text x="650" y="444" class="label">Application Preview</text>

    <g transform="translate(650 470)">
      <rect x="0" y="0" width="402" height="92" rx="20" fill="#FCF8F1" stroke="#DDD4C7"/>
      <rect x="18" y="16" width="60" height="60" rx="18" fill="#F3ECE0" stroke="#D8CEC0"/>

      <g transform="translate(30 28) scale(0.23)">
        <rect x="0" y="0" width="148" height="148" rx="26" fill="#F7F2E9" stroke="#212426" stroke-width="4"/>
        <path d="M49 0V148" stroke="#D8D0C3" stroke-width="1.5"/>
        <path d="M99 0V148" stroke="#D8D0C3" stroke-width="1.5"/>
        <path d="M0 49H148" stroke="#D8D0C3" stroke-width="1.5"/>
        <path d="M0 99H148" stroke="#D8D0C3" stroke-width="1.5"/>
        <rect x="11" y="11" width="26" height="26" rx="7" fill="#1A1C1E"/>
        <rect x="61" y="11" width="26" height="26" rx="7" fill="#274B4B"/>
        <rect x="111" y="11" width="22" height="22" rx="6" fill="#C2A06B"/>
        <rect x="11" y="61" width="26" height="26" rx="7" fill="#D8CEC0"/>
        <rect x="61" y="61" width="26" height="26" rx="7" fill="#1A1C1E"/>
        <rect x="111" y="61" width="26" height="26" rx="7" fill="#D8CEC0"/>
        <rect x="11" y="111" width="26" height="26" rx="7" fill="#D8CEC0"/>
        <rect x="61" y="111" width="26" height="26" rx="7" fill="#274B4B" opacity="0.88"/>
        <rect x="111" y="111" width="26" height="26" rx="7" fill="#1A1C1E"/>
        <path d="M23 85L57 119L127 47" stroke="#F7F2E9" stroke-width="19" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M23 85L57 119L127 47" stroke="url(#brassStroke)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      </g>

      <text x="96" y="38" class="brand-small">HackJudge</text>
      <text x="97" y="58" class="mini-ui">Judge Workspace</text>

      <rect x="258" y="22" width="120" height="10" rx="5" fill="#E7E0D4"/>
      <rect x="258" y="42" width="84" height="10" rx="5" fill="#D7CEC0"/>
      <rect x="258" y="62" width="104" height="10" rx="5" fill="#E7E0D4"/>
    </g>

    <g transform="translate(88 624)">
      <text x="0" y="0" class="label">Concept</text>
      <text x="86" y="0" class="meta">Ledger Crest</text>
      <text x="256" y="0" class="label">Font Combo</text>
      <text x="376" y="0" class="meta">Bodoni Moda + Inter</text>
      <text x="602" y="0" class="label">Tone</text>
      <text x="657" y="0" class="meta">Ceremonial, disciplined, quietly authoritative</text>
    </g>
  </g>
</svg>
