  <path d="M98 268h33l18 18v33L131 334H98L83 319V283L98 268Z" fill="url(#sheet-verdict)" opacity="0.18" />
  <path d="M101 280v42" stroke="#0f172a" stroke-width="8" stroke-linecap="round" />
  <path d="M131 280v42" stroke="#0f172a" stroke-width="8" stroke-linecap="round" />
  <path d="M101 300h18" stroke="#0f172a" stroke-width="8" stroke-linecap="round" />
  <path d="M109 308l9 9 19-27" stroke="url(#sheet-verdict-accent)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" />
