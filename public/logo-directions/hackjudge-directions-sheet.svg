  <text x="187" y="312" fill="#0f172a" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="40" font-weight="800" letter-spacing="-0.06em">Hack</text>
  <text x="287" y="312" fill="#0d9488" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="40" font-weight="800" letter-spacing="-0.06em">Judge</text>
  <text x="90" y="392" fill="#0f172a" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700">Best if:</text>
  <text x="145" y="392" fill="#475569" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="500">you want a durable default that feels official and easy to trust.</text>

  <rect x="640" y="156" width="500" height="300" rx="28" fill="#ffffff" stroke="#dbe3ea" stroke-width="2" />
  <text x="670" y="208" fill="#0f172a" font-family="ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="800">2. Circuit Spark</text>
  <text x="670" y="238" fill="#64748b" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="500">More hackathon-native. The mark leans technical, energetic, and builder-friendly.</text>
  <rect x="668" y="266" width="80" height="80" rx="24" fill="url(#sheet-circuit)" />
  <path d="M690 286v40" stroke="#f8fafc" stroke-width="8" stroke-linecap="round" />
