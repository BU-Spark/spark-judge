<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGlow" x1="120" y1="90" x2="1090" y2="660" gradientUnits="userSpaceOnUse">
      <stop stop-color="#18353C"/>
      <stop offset="0.52" stop-color="#0D1A20"/>
      <stop offset="1" stop-color="#091116"/>
    </linearGradient>
    <linearGradient id="cardWash" x1="180" y1="120" x2="984" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F4EC" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#EAE3D5" stop-opacity="0.94"/>
    </linearGradient>
    <linearGradient id="crestFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#123841"/>
      <stop offset="1" stop-color="#0B2329"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E8C676"/>
      <stop offset="1" stop-color="#B78B3F"/>
    </linearGradient>
    <filter id="shadowLg" x="-20%" y="-20%" width="140%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="30" stdDeviation="34" flood-color="#04080B" flood-opacity="0.42"/>
    </filter>
    <filter id="shadowSm" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#020507" flood-opacity="0.22"/>
    </filter>
  </defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=Sora:wght@500;600;700;800&amp;display=swap');

    .eyebrow {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }
    .concept {
      font-family: 'Sora', sans-serif;
      font-size: 58px;
      font-weight: 700;
      letter-spacing: -0.045em;
      fill: #0E1D24;
    }
    .wordmark {
      font-family: 'Sora', sans-serif;
      font-size: 84px;
      font-weight: 700;
      letter-spacing: -0.06em;
      fill: #0C1820;
    }
    .body {
      font-family: 'Inter', sans-serif;
      font-size: 21px;
      line-height: 1.5;
      font-weight: 500;
      fill: #39505B;
    }
    .label {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      fill: #687A83;
    }
    .meta {
      font-family: 'Inter', sans-serif;
      font-size: 20px;
      font-weight: 600;
      fill: #10242C;
    }
    .mini {
      font-family: 'Inter', sans-serif;
      font-size: 18px;
      font-weight: 600;
      fill: #E7E1D4;
    }
    .miniLabel {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      fill: #A8B9BF;
    }
  </style>

  <rect width="1200" height="720" fill="#091116"/>
  <circle cx="175" cy="94" r="210" fill="#1B4448" opacity="0.28"/>
  <circle cx="1056" cy="636" r="244" fill="#0E2F35" opacity="0.32"/>
  <rect x="36" y="36" width="1128" height="648" rx="34" fill="url(#bgGlow)"/>
  <rect x="94" y="82" width="1012" height="556" rx="32" fill="url(#cardWash)" filter="url(#shadowLg)"/>

  <text x="152" y="150" class="eyebrow" fill="#6B827D">Premium Exploration / 03</text>
  <text x="152" y="205" class="concept">Scorecrest</text>

  <g transform="translate(152 256)">
    <rect x="0" y="0" width="158" height="158" rx="38" fill="#F5F1E8"/>
    <rect x="10" y="10" width="138" height="138" rx="32" fill="url(#crestFill)" stroke="#D9C69B" stroke-width="2.5" filter="url(#shadowSm)"/>

    <rect x="32" y="32" width="24" height="24" rx="8" fill="#6F858B" opacity="0.34"/>
    <rect x="67" y="32" width="24" height="24" rx="8" fill="#2B5960" opacity="0.78"/>
    <rect x="102" y="32" width="24" height="24" rx="8" fill="#E7D3A0"/>

    <rect x="32" y="67" width="24" height="24" rx="8" fill="#2A474E" opacity="0.76"/>
    <rect x="67" y="67" width="24" height="24" rx="8" fill="#D9E3E1"/>
    <rect x="102" y="67" width="24" height="24" rx="8" fill="#2B5960" opacity="0.92"/>

    <rect x="32" y="102" width="24" height="24" rx="8" fill="#E7D3A0"/>
    <rect x="67" y="102" width="24" height="24" rx="8" fill="#6E858A" opacity="0.44"/>
    <rect x="102" y="102" width="24" height="24" rx="8" fill="#173941"/>

    <path d="M42 100L61 119L114 56" stroke="url(#goldLine)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="338" y="335" class="wordmark">HackJudge</text>
  <text x="340" y="380" class="body">An official-feeling identity direction for demo days, finals, and judged events.</text>
  <text x="340" y="412" class="body">The score-grid becomes a crest: stricter, calmer, and more authoritative.</text>

  <g transform="translate(152 500)">
    <text x="0" y="0" class="label">Font Pairing</text>
    <text x="0" y="34" class="meta">Sora for brand / Inter for product UI</text>
  </g>
  <g transform="translate(520 500)">
    <text x="0" y="0" class="label">Concept</text>
    <text x="0" y="34" class="meta">Event-grade score crest</text>
  </g>

