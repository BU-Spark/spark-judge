    <rect x="0" y="26" width="220" height="350" rx="30" fill="#0C1A21"/>
    <rect x="20" y="22" width="180" height="306" rx="22" fill="#12262D" stroke="#27434A"/>
    <rect x="43" y="52" width="134" height="134" rx="30" fill="#F2EBDD"/>
    <rect x="55" y="64" width="110" height="110" rx="25" fill="url(#crestFill)" stroke="#D7C08A" stroke-width="2"/>

    <rect x="72" y="81" width="18" height="18" rx="6" fill="#61777C" opacity="0.4"/>
    <rect x="98" y="81" width="18" height="18" rx="6" fill="#2B5960" opacity="0.8"/>
    <rect x="124" y="81" width="18" height="18" rx="6" fill="#E7D3A0"/>

    <rect x="72" y="107" width="18" height="18" rx="6" fill="#244149" opacity="0.88"/>
    <rect x="98" y="107" width="18" height="18" rx="6" fill="#DDE6E3"/>
    <rect x="124" y="107" width="18" height="18" rx="6" fill="#2B5960"/>

    <rect x="72" y="133" width="18" height="18" rx="6" fill="#E7D3A0"/>
    <rect x="98" y="133" width="18" height="18" rx="6" fill="#61777C" opacity="0.46"/>
    <rect x="124" y="133" width="18" height="18" rx="6" fill="#183A42"/>

    <path d="M79 131L94 146L133 99" stroke="url(#goldLine)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

    <text x="44" y="219" class="miniLabel">Finalist Badge</text>
    <text x="44" y="251" class="mini" style="font-family:'Sora',sans-serif;font-size:28px;font-weight:700;letter-spacing:-0.04em;">HackJudge</text>
    <rect x="44" y="272" width="112" height="2" rx="1" fill="#31565E"/>
    <text x="44" y="301" class="mini" style="font-size:14px;fill:#A8B9BF;">Official review panel</text>

    <rect x="54" y="372" width="56" height="56" rx="16" fill="#F4EEE2"/>
    <rect x="61" y="379" width="42" height="42" rx="12" fill="#10242C"/>
    <rect x="71" y="389" width="7" height="7" rx="2.5" fill="#6D848A" opacity="0.45"/>
    <rect x="81" y="389" width="7" height="7" rx="2.5" fill="#2B5960"/>
    <rect x="91" y="389" width="7" height="7" rx="2.5" fill="#E7D3A0"/>
    <rect x="71" y="399" width="7" height="7" rx="2.5" fill="#28454C"/>
    <rect x="81" y="399" width="7" height="7" rx="2.5" fill="#DDE6E3"/>
    <rect x="91" y="399" width="7" height="7" rx="2.5" fill="#2B5960"/>
    <rect x="71" y="409" width="7" height="7" rx="2.5" fill="#E7D3A0"/>
    <rect x="81" y="409" width="7" height="7" rx="2.5" fill="#6D848A" opacity="0.45"/>
    <rect x="91" y="409" width="7" height="7" rx="2.5" fill="#183A42"/>
    <path d="M74 408L80 414L95 395" stroke="url(#goldLine)" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>

    <text x="122" y="398" class="miniLabel">App icon</text>
    <text x="122" y="419" class="mini" style="font-size:15px;fill:#CFD8D4;">Small-mark preview</text>
